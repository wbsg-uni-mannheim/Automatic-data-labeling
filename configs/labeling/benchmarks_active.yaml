defaults:
  output_root: output/simple_labeling
  run_prefix: benchmark
  runner_script: scripts/labeling/run_three_phase_labeling.py
  random_profile_enabled: true
  random_profile_fraction: 0.20
  random_profile_model: qwen/qwen3.6-plus
  random_profile_seed: 42
  random_profile_api_base_url: https://openrouter.ai/api/v1
  random_profile_api_key_env_var: OPEN_ROUTER_API_KEY
  labeling_args:
    model: qwen/qwen3.6-plus
    api_base_url: https://openrouter.ai/api/v1
    api_key_env_var: OPEN_ROUTER_API_KEY
    faiss_k: 20
    faiss_random_state: 42
    seed_size: 100
    seed_positives: 30
    seed_max_calls: 400
    seed_pos_per_query: 1
    seed_neg_per_query: 4
    seed_batch_size: 5
    seed_bottom_k: 2
    seed_query_order: random
    labels_per_iteration: 500
    active_candidates: 20000
    max_iterations: 3_00
    adaptive_round_size: 0
    adaptive_neg_min_share: 0.30
    adaptive_neg_max_share: 0.90
    phase2_target_size: 1000
    phase3_batch_size: 500
    phase3_candidates: 20000
    phase3_ensemble_mode: ditto_only
    llm_concurrency: 10

benchmarks:
  wdc:
    left_csv: data/wdc/wdc_train_large_left.csv
    right_csv: data/wdc/wdc_train_large_right.csv
    valid_path: data/wdc/wdcproducts80cc20rnd000un_valid_large.json.gz
    test_path: data/wdc/wdcproducts80cc20rnd100un_gs.json.gz
    id_col: id
    fields:
      title: title
      brand: brand
      description: description
      price: price
      priceCurrency: priceCurrency
    embeddings:
      dir: data/wdc/embeddings
      left_file: wdc_left_embeddings.npy
      right_file: wdc_right_embeddings.npy
    profiles:
      small:  {target_total: 2500, target_pos: 500,  target_neg: 2000,  label_budget: 4000}
      medium: {target_total: 10000, target_pos: 2500, target_neg: 7500,  label_budget: 15000}
      large:  {target_total: 20000, target_pos: 5000, target_neg: 15000, label_budget: 30000}
      all:    {all_examples: true}

  abt-buy:
    left_csv: data/abt-buy/abt-buy-train-left.csv
    right_csv: data/abt-buy/abt-buy-train-right.csv
    valid_path: data/abt-buy/abt-buy-valid.csv
    test_path: data/abt-buy/abt-buy-gs.json.gz
    id_col: id
    fields:
      title: title
      description: description
      price: price
    embeddings:
      dir: data/abt-buy/embeddings
      left_file: abt-buy_left_embeddings.npy
      right_file: abt-buy_right_embeddings.npy
    labeling_args:
