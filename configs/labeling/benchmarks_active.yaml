      api_key_env_var: OPEN_ROUTER_API_KEY
    random_profile_model: qwen/qwen3.6-plus
    random_profile_api_base_url: https://openrouter.ai/api/v1
    random_profile_api_key_env_var: OPEN_ROUTER_API_KEY
    profiles:
      small:  {target_total: 1000, target_pos: 200, target_neg: 800,  label_budget: 1500}
      medium: {target_total: 3000, target_pos: 600, target_neg: 2400, label_budget: 4500}
      large:  {target_total: 5000, target_pos: 800, target_neg: 4200, label_budget: 7500}
      all:    {all_examples: true}

