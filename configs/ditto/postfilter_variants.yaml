defaults:
  output_root: output/ditto_postfilter_variants
  active_profiles: [all]
  model_name: roberta-base
  batch_size: 64
  max_len: 256
  epochs: 50
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_accum_steps: 1
  early_stopping_patience: 10
  seed: 42
  num_workers: 2
  fp16: true
  da: del
  alpha_aug: 0.8
  summarize: false
  dk: null
  spacy_model: en_core_web_sm
  max_field_len: 350
  # No filtering — postfilter variants are produced upstream.
  exclude_valid_from_train: false

benchmarks:
  # ===== abt-buy =====
  abt-buy_v_relabel:
    train: output/postfilter_variants/abt-buy/v_relabel/train.json.gz
    valid: benchmarks/abt-buy/abt-buy-valid.csv
    valid_pair_id_only: true
    valid_lookup_train: benchmarks/abt-buy/abt-buy-train.json
    test:  benchmarks/abt-buy/abt-buy-gs.json.gz
    fields: [title, description, price]
    field_aliases: {title: [name]}
  abt-buy_v_relabel_drop:
    train: output/postfilter_variants/abt-buy/v_relabel_drop/train.json.gz
    valid: benchmarks/abt-buy/abt-buy-valid.csv
