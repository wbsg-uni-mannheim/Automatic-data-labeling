defaults:
  output_root: output/ditto_walmart_amazon_alditto_new_relabel
  active_profiles: [all]
  model_name: roberta-base
  batch_size: 64
  max_len: 256
  epochs: 50
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_accum_steps: 1
  early_stopping_patience: 10
  seed: 42
  num_workers: 2
  fp16: true
  da: del
  alpha_aug: 0.8
  summarize: false
  dk: null
  spacy_model: en_core_web_sm
  max_field_len: 350
  # No test-leak cleaning. Train file = gpt-5-mini-relabeled version of the
  # resumed walmart-amazon AL(Ditto) run (6117 pairs).
  exclude_valid_from_train: true

benchmarks:
  walmart-amazon:
    train: output/three_phase_labeling_ditto_only_v2/benchmark_walmart-amazon_20260323_202820/profiles/all/active_labels_latest_walmart-amazon_all_train__relabeled__gpt-5-mini__agent-precision-system-prompt.json.gz
    valid: data/walmart-amazon/walmart-amazon-valid.csv
    test: data/walmart-amazon/walmart-amazon-gs.json.gz
    fields: [title, category, brand, modelno, price]
