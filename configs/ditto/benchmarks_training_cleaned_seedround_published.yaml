defaults:
  output_root: output/ditto_cleaned_seedround_published_runs
  active_profiles: [all]
  model_name: roberta-base
  batch_size: 64
  max_len: 256
  epochs: 50
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_accum_steps: 1
  early_stopping_patience: 10
  seed: 42
  num_workers: 2
  fp16: true
  da: del
  alpha_aug: 0.8
  summarize: false
  dk: null
  spacy_model: en_core_web_sm
  max_field_len: 350
  exclude_valid_from_train: true

# Only the two combos whose profile differs from the previous seedround config.
benchmarks:
  walmart-amazon:
    train: output/labeling_cleaned/seed_round/walmart-amazon/profiles/all/active_labels_latest_walmart-amazon_all_train.json.gz
    valid: data/walmart-amazon/walmart-amazon-valid.csv
    test: data/walmart-amazon/walmart-amazon-gs.json.gz
    fields: [title, category, brand, modelno, price]

  wdc:
    train: output/labeling_cleaned/seed_round/wdc/profiles/medium/active_labels_latest_wdc_medium_train.json.gz
    valid: data/wdc/wdcproducts80cc20rnd000un_valid_medium.json.gz
    test: data/wdc/wdcproducts80cc20rnd100un_gs.json.gz
    fields: [title, brand, description, price, priceCurrency]
