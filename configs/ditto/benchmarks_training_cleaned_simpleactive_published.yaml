defaults:
  output_root: output/ditto_cleaned_simpleactive_published_runs
  active_profiles: [all]
  model_name: roberta-base
  batch_size: 64
  max_len: 256
  epochs: 50
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_accum_steps: 1
  early_stopping_patience: 10
  seed: 42
  num_workers: 2
  fp16: true
  da: del
  alpha_aug: 0.8
  summarize: false
  dk: null
  spacy_model: en_core_web_sm
  max_field_len: 350
  exclude_valid_from_train: true

benchmarks:
  wdc:
    train: output/labeling_cleaned/simple_active/wdc/profiles/large/active_labels_latest_wdc_large_train.json.gz
    valid: data/wdc/wdcproducts80cc20rnd000un_valid_medium.json.gz
    test: data/wdc/wdcproducts80cc20rnd100un_gs.json.gz
    fields: [title, brand, description, price, priceCurrency]
