defaults:
  output_root: output/ditto_learning_curve_abtbuy
  active_profiles: [all]
  model_name: roberta-base
  batch_size: 64
  max_len: 256
  epochs: 50
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_accum_steps: 1
  early_stopping_patience: 10
  seed: 42
  num_workers: 2
  fp16: true
  da: del
  alpha_aug: 0.8
  summarize: false
  dk: null
  spacy_model: en_core_web_sm
  max_field_len: 350
  # No test-leak cleaning — train data may contain test pairs (per user request).
  # We still want to exclude validation pairs from training (avoid trivial val-on-train).
  exclude_valid_from_train: true

benchmarks:
  # similarity_selection (FAISS+GPT, chronological by FAISS rank)
  simsel_N1000:
    train: output/learning_curve_abtbuy/similarity_selection/N1000/abt-buy_N1000_train.json.gz
    valid: benchmarks/abt-buy/abt-buy-valid.csv
    valid_pair_id_only: true
    valid_lookup_train: benchmarks/abt-buy/abt-buy-train.json
    test: benchmarks/abt-buy/abt-buy-gs.json.gz
    fields: [title, description, price]
    field_aliases: {title: [name]}
  simsel_N2000:
